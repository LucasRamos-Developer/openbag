name: open_bag
description: Um aplicativo de delivery open source - Mobile & Web

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  
  # UI Components
  cupertino_icons: ^1.0.6
  material_design_icons_flutter: ^7.0.7296
  
  # State Management
  provider: ^6.1.1
  
  # HTTP
  http: ^1.1.2
  dio: ^5.4.0
  
  # Local Storage (Cross-platform)
  shared_preferences: ^2.2.2
  
  # Navigation
  go_router: ^12.1.3
  
  # Maps (Web compatible) - OpenStreetMap
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^10.1.0
  geolocator_web: ^2.2.0
  
  # Image (Web compatible)
  cached_network_image: ^3.3.0
  image_picker: ^1.0.7
  image_picker_for_web: ^3.0.1
  
  # Utils
  intl: ^0.18.1
  uuid: ^4.2.1
  url_launcher: ^6.2.4
  
  # Loading & UI
  shimmer: ^3.0.0
  
  # Forms
  mask_text_input_formatter: ^2.7.0
  
  # Responsive Design
  responsive_framework: ^1.1.1
  
  # Web specific
  flutter_web_plugins:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
  
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
